<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>HabitFlow</title>
  <meta name="description" content="Tu tracker de hábitos personal" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HabitFlow" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f13; color: #fff; max-width: 430px; margin: 0 auto; min-height: 100dvh; overflow-x: hidden; }
    input, textarea, button { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const COLORS = ["#6EE7B7","#93C5FD","#FCA5A5","#FCD34D","#C4B5FD","#FB923C","#F9A8D4","#6EE7E7"];
    const ICON_CATEGORIES = [
      { label: "Salud",   icons: [["💪","Ejercicio"],["🏃","Correr"],["🧘","Meditación"],["💧","Hidratación"],["🥗","Nutrición"],["😴","Descanso"]] },
      { label: "Mente",   icons: [["📚","Lectura"],["✍️","Escritura"],["🧠","Aprender"],["🎯","Foco"]] },
      { label: "Hábitos", icons: [["🚭","Sin fumar"],["🍷","Sin alcohol"],["📵","Sin móvil"],["💊","Medicación"]] },
      { label: "Hogar",   icons: [["🧹","Limpieza"],["🌱","Plantas"],["🛒","Compra"],["🍳","Cocinar"]] },
      { label: "Ocio",    icons: [["🎵","Música"],["🎨","Arte"],["🎮","Juegos"],["🚶","Pasear"]] },
    ];
    const FREQUENCIES = ["Diario","L-V","Fin de semana","Personalizado"];
    const DAYS = ["L","M","X","J","V","S","D"];
    const DAY_KEYS = ["mon","tue","wed","thu","fri","sat","sun"];

    function getTodayKey() { return new Date().toISOString().split("T")[0]; }
    function getWeekDates() {
      const today = new Date(), day = today.getDay();
      const monday = new Date(today);
      monday.setDate(today.getDate() - ((day + 6) % 7));
      return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d.toISOString().split("T")[0];});
    }
    function getTodayDayKey() { return DAY_KEYS[(new Date().getDay()+6)%7]; }
    function isHabitActiveToday(habit) {
      const f = habit.frequency, dk = getTodayDayKey();
      if(f==="Diario") return true;
      if(f==="L-V") return ["mon","tue","wed","thu","fri"].includes(dk);
      if(f==="Fin de semana") return ["sat","sun"].includes(dk);
      if(f==="Personalizado") return habit.customDays?.includes(dk);
      return true;
    }
    function getStreak(habit) {
      const c = habit.completions||{};
      let streak=0;
      const today=new Date();
      for(let i=0;i<365;i++){
        const d=new Date(today); d.setDate(today.getDate()-i);
        const key=d.toISOString().split("T")[0];
        if(c[key]) streak++; else if(i>0) break;
      }
      return streak;
    }
    function getCompletionRate(habit) {
      const c=habit.completions||{};
      const done=Object.keys(c).filter(k=>c[k]).length;
      const days=Math.max(1,Math.ceil((new Date()-new Date(habit.createdAt))/(1000*60*60*24)));
      return Math.round((done/days)*100);
    }

    function App() {
      const [habits, setHabits] = useState(()=>{try{return JSON.parse(localStorage.getItem("habitflow_v1")||"[]");}catch{return [];}});
      const [view, setView] = useState("today");
      const [editingHabit, setEditingHabit] = useState(null);
      const [selectedHabit, setSelectedHabit] = useState(null);
      const [form, setForm] = useState({name:"",icon:"💪",color:COLORS[0],frequency:"Diario",customDays:[],note:""});
      const weekDates = getWeekDates();
      const todayKey = getTodayKey();

      useEffect(()=>{ localStorage.setItem("habitflow_v1", JSON.stringify(habits)); }, [habits]);

      function toggleCompletion(habitId, dateKey) {
        setHabits(prev=>prev.map(h=>{
          if(h.id!==habitId) return h;
          const completions={...h.completions};
          completions[dateKey]=!completions[dateKey];
          return {...h,completions};
        }));
        if(selectedHabit?.id===habitId) setSelectedHabit(prev=>({...prev,completions:{...prev.completions,[dateKey]:!(prev.completions||{})[dateKey]}}));
      }

      function saveHabit() {
        if(!form.name.trim()) return;
        if(editingHabit) {
          setHabits(prev=>prev.map(h=>h.id===editingHabit.id?{...h,...form}:h));
          setEditingHabit(null);
        } else {
          setHabits(prev=>[...prev,{...form,id:Date.now().toString(),completions:{},createdAt:new Date().toISOString()}]);
        }
        setForm({name:"",icon:"💪",color:COLORS[0],frequency:"Diario",customDays:[],note:""});
        setView("today");
      }

      function deleteHabit(id) {
        setHabits(prev=>prev.filter(h=>h.id!==id));
        setSelectedHabit(null); setView("today");
      }

      function startEdit(habit) {
        setForm({name:habit.name,icon:habit.icon,color:habit.color,frequency:habit.frequency,customDays:habit.customDays||[],note:habit.note||""});
        setEditingHabit(habit); setView("add");
      }

      const todayHabits = habits.filter(isHabitActiveToday);
      const completedToday = todayHabits.filter(h=>(h.completions||{})[todayKey]);
      const progress = todayHabits.length ? Math.round((completedToday.length/todayHabits.length)*100) : 0;

      const s = {
        page: {minHeight:"100dvh",display:"flex",flexDirection:"column"},
        header: {padding:"calc(env(safe-area-inset-top, 0px) + 52px) 20px 16px",background:"linear-gradient(180deg,#16161d 0%,#0f0f13 100%)"},
        card: {background:"#1a1a22",borderRadius:18,padding:16,marginBottom:10,border:"1.5px solid #252530"},
        btn: (active,color)=>({padding:"9px 16px",borderRadius:12,background:active?color:"#1a1a22",border:`1.5px solid ${active?color:"#252530"}`,color:active?"#000":"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}),
        input: {width:"100%",background:"#1a1a22",border:"1.5px solid #252530",borderRadius:14,padding:"14px 16px",color:"#fff",fontSize:16,outline:"none"},
        label: {fontSize:12,color:"#666",textTransform:"uppercase",letterSpacing:1,fontWeight:500},
        backBtn: {background:"#1a1a22",border:"none",color:"#fff",width:36,height:36,borderRadius:10,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
      };

      return (
        <div style={s.page}>
          {/* Header */}
          {view!=="add" && view!=="detail" && (
            <div style={s.header}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <p style={{fontSize:13,color:"#666",letterSpacing:1,textTransform:"uppercase",fontWeight:500}}>
                    {new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}
                  </p>
                  <h1 style={{margin:"4px 0 0",fontSize:26,fontWeight:700,letterSpacing:-0.5}}>
                    {view==="today"?"Mis hábitos":"Estadísticas"}
                  </h1>
                </div>
                <button onClick={()=>{setEditingHabit(null);setForm({name:"",icon:"💪",color:COLORS[0],frequency:"Diario",customDays:[],note:""});setView("add");}}
                  style={{width:40,height:40,borderRadius:12,background:"#6EE7B7",border:"none",fontSize:22,cursor:"pointer",color:"#000",fontWeight:700}}>+</button>
              </div>
              {view==="today" && todayHabits.length>0 && (
                <div style={{marginTop:16,background:"#1a1a22",borderRadius:16,padding:"14px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:13,color:"#888"}}>{completedToday.length} de {todayHabits.length} completados</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#6EE7B7"}}>{progress}%</span>
                  </div>
                  <div style={{background:"#252530",borderRadius:99,height:6,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#6EE7B7,#93C5FD)",borderRadius:99,transition:"width 0.5s ease"}}/>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* TODAY */}
          {view==="today" && (
            <div style={{flex:1,overflowY:"auto",padding:"8px 20px 100px"}}>
              {habits.length===0 && (
                <div style={{textAlign:"center",padding:"80px 20px",color:"#444"}}>
                  <div style={{fontSize:52,marginBottom:16}}>🌱</div>
                  <p style={{fontSize:17,fontWeight:600,color:"#555"}}>Empieza tu primer hábito</p>
                  <p style={{fontSize:13,marginTop:6,color:"#444"}}>Pulsa + para añadir uno</p>
                </div>
              )}
              {todayHabits.map(habit=>{
                const done=(habit.completions||{})[todayKey];
                const streak=getStreak(habit);
                return (
                  <div key={habit.id} style={{background:done?`${habit.color}15`:"#1a1a22",borderRadius:18,padding:"14px 16px",marginBottom:10,border:`1.5px solid ${done?habit.color+"40":"#252530"}`,display:"flex",alignItems:"center",gap:14,transition:"all 0.2s"}}>
                    <div onClick={()=>toggleCompletion(habit.id,todayKey)}
                      style={{width:46,height:46,borderRadius:14,background:done?habit.color:"#252530",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",flexShrink:0,transition:"all 0.2s",boxShadow:done?`0 4px 12px ${habit.color}50`:"none"}}>
                      {done?"✓":habit.icon}
                    </div>
                    <div style={{flex:1}} onClick={()=>{setSelectedHabit(habits.find(h=>h.id===habit.id));setView("detail");}}>
                      <p style={{margin:0,fontWeight:600,fontSize:15,color:done?"#888":"#fff",textDecoration:done?"line-through":"none"}}>{habit.name}</p>
                      <div style={{display:"flex",gap:8,marginTop:4,alignItems:"center"}}>
                        {streak>0 && <span style={{fontSize:11,color:"#FCD34D",fontWeight:600}}>🔥 {streak} días</span>}
                        <span style={{fontSize:11,color:"#555",fontWeight:500}}>{habit.frequency}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:3}}>
                      {weekDates.map((d,i)=>{
                        const c=(habit.completions||{})[d];
                        return <div key={i} style={{width:8,height:8,borderRadius:3,background:c?habit.color:"#252530",border:d===todayKey?`1px solid ${habit.color}`:"none"}}/>;
                      })}
                    </div>
                  </div>
                );
              })}
              {habits.filter(h=>!isHabitActiveToday(h)).length>0 && <>
                <p style={{fontSize:12,color:"#444",margin:"20px 0 10px",textTransform:"uppercase",letterSpacing:1,fontWeight:500}}>Inactivos hoy</p>
                {habits.filter(h=>!isHabitActiveToday(h)).map(habit=>(
                  <div key={habit.id} onClick={()=>{setSelectedHabit(habit);setView("detail");}}
                    style={{background:"#16161d",borderRadius:18,padding:"12px 16px",marginBottom:8,border:"1.5px solid #1e1e26",display:"flex",alignItems:"center",gap:12,opacity:0.5,cursor:"pointer"}}>
                    <div style={{width:36,height:36,borderRadius:12,background:"#252530",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{habit.icon}</div>
                    <p style={{margin:0,fontWeight:500,fontSize:14}}>{habit.name}</p>
                  </div>
                ))}
              </>}
            </div>
          )}

          {/* STATS */}
          {view==="stats" && (
            <div style={{flex:1,overflowY:"auto",padding:"8px 20px 100px"}}>
              {habits.length===0 ? (
                <div style={{textAlign:"center",padding:"80px 20px",color:"#444"}}>
                  <div style={{fontSize:52,marginBottom:16}}>📊</div>
                  <p style={{fontSize:16}}>Sin datos aún</p>
                </div>
              ) : habits.map(habit=>{
                const streak=getStreak(habit);
                const rate=getCompletionRate(habit);
                const totalDone=Object.values(habit.completions||{}).filter(Boolean).length;
                return (
                  <div key={habit.id} style={{...s.card,marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                      <div style={{width:42,height:42,borderRadius:13,background:habit.color+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{habit.icon}</div>
                      <div>
                        <p style={{margin:0,fontWeight:600,fontSize:15}}>{habit.name}</p>
                        <p style={{margin:0,fontSize:12,color:"#555"}}>{habit.frequency}</p>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                      {[["🔥",streak,"Racha"],["✅",totalDone,"Total"],["📈",rate+"%","Tasa"]].map(([ic,val,label])=>(
                        <div key={label} style={{background:"#252530",borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                          <div style={{fontSize:16}}>{ic}</div>
                          <div style={{fontSize:18,fontWeight:700,color:habit.color,marginTop:2}}>{val}</div>
                          <div style={{fontSize:10,color:"#555",marginTop:2}}>{label}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                      {Array.from({length:30},(_,i)=>{
                        const d=new Date(); d.setDate(d.getDate()-29+i);
                        const key=d.toISOString().split("T")[0];
                        return <div key={i} style={{width:16,height:16,borderRadius:4,background:(habit.completions||{})[key]?habit.color:"#252530"}}/>;
                      })}
                    </div>
                    <p style={{margin:"6px 0 0",fontSize:11,color:"#444"}}>Últimos 30 días</p>
                  </div>
                );
              })}
            </div>
          )}

          {/* ADD/EDIT */}
          {view==="add" && (
            <div style={{flex:1,overflowY:"auto",padding:"calc(env(safe-area-inset-top,0px) + 52px) 20px 100px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
                <button onClick={()=>{setView("today");setEditingHabit(null);}} style={s.backBtn}>←</button>
                <h2 style={{fontWeight:700,fontSize:22}}>{editingHabit?"Editar hábito":"Nuevo hábito"}</h2>
              </div>
              <label style={s.label}>Nombre</label>
              <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Beber 2L de agua"
                style={{...s.input,marginTop:8,marginBottom:20}}/>
              <label style={s.label}>Icono</label>
              <div style={{margin:"10px 0 20px"}}>
                {ICON_CATEGORIES.map(cat=>(
                  <div key={cat.label} style={{marginBottom:12}}>
                    <p style={{fontSize:11,color:"#555",fontWeight:600,letterSpacing:0.5,marginBottom:6,textTransform:"uppercase"}}>{cat.label}</p>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      {cat.icons.map(([ic,label])=>{
                        const active=form.icon===ic;
                        return (
                          <button key={ic} onClick={()=>setForm({...form,icon:ic})}
                            style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:12,background:active?form.color+"20":"#1a1a22",border:`1.5px solid ${active?form.color:"#252530"}`,cursor:"pointer",textAlign:"left"}}>
                            <span style={{fontSize:20,width:28,textAlign:"center"}}>{ic}</span>
                            <span style={{fontSize:14,fontWeight:active?600:400,color:active?form.color:"#ccc"}}>{label}</span>
                            {active && <span style={{marginLeft:"auto",fontSize:12,color:form.color}}>✓</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              <label style={s.label}>Color</label>
              <div style={{display:"flex",gap:10,margin:"10px 0 20px"}}>
                {COLORS.map(c=>(
                  <button key={c} onClick={()=>setForm({...form,color:c})}
                    style={{width:32,height:32,borderRadius:10,background:c,border:`3px solid ${form.color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>
                ))}
              </div>
              <label style={s.label}>Frecuencia</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,margin:"10px 0 20px"}}>
                {FREQUENCIES.map(f=>(
                  <button key={f} onClick={()=>setForm({...form,frequency:f})} style={s.btn(form.frequency===f,form.color)}>{f}</button>
                ))}
              </div>
              {form.frequency==="Personalizado" && (
                <div style={{marginBottom:20,display:"flex",gap:8}}>
                  {DAYS.map((d,i)=>{
                    const dk=DAY_KEYS[i], active=form.customDays.includes(dk);
                    return (
                      <button key={d} onClick={()=>setForm({...form,customDays:active?form.customDays.filter(x=>x!==dk):[...form.customDays,dk]})}
                        style={{flex:1,height:42,borderRadius:10,background:active?form.color:"#1a1a22",border:`1.5px solid ${active?form.color:"#252530"}`,color:active?"#000":"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>{d}</button>
                    );
                  })}
                </div>
              )}
              <label style={s.label}>Nota (opcional)</label>
              <textarea value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="Motivación, contexto..."
                style={{...s.input,marginTop:8,marginBottom:24,resize:"none",height:80}}/>
              <button onClick={saveHabit}
                style={{width:"100%",padding:16,background:form.color,border:"none",borderRadius:16,fontSize:16,fontWeight:700,cursor:"pointer",color:"#000",boxShadow:`0 8px 24px ${form.color}50`}}>
                {editingHabit?"Guardar cambios":"Crear hábito"}
              </button>
            </div>
          )}

          {/* DETAIL */}
          {view==="detail" && selectedHabit && (()=>{
            const habit=habits.find(h=>h.id===selectedHabit.id)||selectedHabit;
            const streak=getStreak(habit);
            const rate=getCompletionRate(habit);
            const totalDone=Object.values(habit.completions||{}).filter(Boolean).length;
            return (
              <div style={{flex:1,overflowY:"auto",padding:"calc(env(safe-area-inset-top,0px) + 52px) 20px 100px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
                  <button onClick={()=>setView("today")} style={s.backBtn}>←</button>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>startEdit(habit)} style={{background:"#1a1a22",border:"1.5px solid #252530",color:"#fff",padding:"8px 14px",borderRadius:10,fontSize:13,cursor:"pointer"}}>Editar</button>
                    <button onClick={()=>deleteHabit(habit.id)} style={{background:"#FF4444",border:"none",color:"#fff",padding:"8px 14px",borderRadius:10,fontSize:13,cursor:"pointer"}}>Eliminar</button>
                  </div>
                </div>
                <div style={{textAlign:"center",marginBottom:24}}>
                  <div style={{width:72,height:72,borderRadius:22,background:habit.color+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 12px",boxShadow:`0 8px 24px ${habit.color}30`}}>{habit.icon}</div>
                  <h2 style={{fontSize:24,fontWeight:700}}>{habit.name}</h2>
                  <p style={{margin:"4px 0 0",color:"#555",fontSize:13}}>{habit.frequency}</p>
                  {habit.note && <p style={{margin:"10px 20px 0",color:"#666",fontSize:13,fontStyle:"italic"}}>{habit.note}</p>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
                  {[["🔥",streak,"Racha"],["✅",totalDone,"Total"],["📈",rate+"%","Tasa"]].map(([ic,val,label])=>(
                    <div key={label} style={{background:"#1a1a22",borderRadius:16,padding:14,textAlign:"center",border:"1.5px solid #252530"}}>
                      <div style={{fontSize:20}}>{ic}</div>
                      <div style={{fontSize:22,fontWeight:700,color:habit.color,marginTop:4}}>{val}</div>
                      <div style={{fontSize:11,color:"#555",marginTop:2}}>{label}</div>
                    </div>
                  ))}
                </div>
                <h3 style={{margin:"0 0 12px",fontSize:13,color:"#555",textTransform:"uppercase",letterSpacing:1,fontWeight:500}}>Semana actual</h3>
                <div style={{display:"flex",gap:8,marginBottom:24}}>
                  {weekDates.map((d,i)=>{
                    const done=(habit.completions||{})[d];
                    const isToday=d===todayKey;
                    return (
                      <div key={i} onClick={()=>toggleCompletion(habit.id,d)} style={{flex:1,textAlign:"center",cursor:"pointer"}}>
                        <div style={{fontSize:11,color:isToday?habit.color:"#555",fontWeight:isToday?700:400,marginBottom:6}}>{DAYS[i]}</div>
                        <div style={{height:38,borderRadius:10,background:done?habit.color:"#1a1a22",border:`1.5px solid ${isToday?habit.color:"#252530"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,transition:"all 0.2s"}}>
                          {done?"✓":""}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <h3 style={{margin:"0 0 12px",fontSize:13,color:"#555",textTransform:"uppercase",letterSpacing:1,fontWeight:500}}>Últimos 30 días</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,background:"#1a1a22",borderRadius:16,padding:16,border:"1.5px solid #252530"}}>
                  {Array.from({length:30},(_,i)=>{
                    const d=new Date(); d.setDate(d.getDate()-29+i);
                    const key=d.toISOString().split("T")[0];
                    const done=(habit.completions||{})[key];
                    return <div key={i} onClick={()=>toggleCompletion(habit.id,key)}
                      style={{width:"calc(14.28% - 4px)",aspectRatio:"1",borderRadius:6,background:done?habit.color:"#252530",border:key===todayKey?`2px solid ${habit.color}`:"none",cursor:"pointer",transition:"all 0.15s"}}/>;
                  })}
                </div>
              </div>
            );
          })()}

          {/* NAV */}
          {view!=="add" && view!=="detail" && (
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#16161d",borderTop:"1px solid #1e1e26",display:"flex",padding:`12px 0 calc(env(safe-area-inset-bottom, 0px) + 12px)`}}>
              {[["today","Hoy","☀️"],["stats","Stats","📊"]].map(([v,label,ic])=>(
                <button key={v} onClick={()=>setView(v)}
                  style={{flex:1,background:"none",border:"none",color:view===v?"#6EE7B7":"#444",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:20}}>{ic}</span>
                  <span style={{fontSize:11,fontWeight:view===v?700:400}}>{label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <script>
    if('serviceWorker' in navigator) {
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
